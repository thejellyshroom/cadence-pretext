<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid typography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #e8e4dc;
      --ink-dim: #6a6560;
      --bg: #030308;
      --panel: rgba(6, 6, 10, 0.82);
      --border: rgba(230, 240, 255, 0.08);
      --accent: #5ee0ff;
      --accent-dim: rgba(94, 224, 255, 0.35);
      --gold: #c8a96e;
      --gold-dim: rgba(200, 169, 110, 0.28);
      --red: #c44;
      --mono: 'DM Mono', ui-monospace, monospace;
      --serif: 'Cormorant Garamond', Georgia, serif;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--serif);
    }

    /* ── Canvas fills screen ─────────────────────────────── */
    #gl {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    /* ── HUD panel ───────────────────────────────────────── */
    .hud {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: min(380px, calc(100vw - 20px));
      margin: 20px;
      padding: 0;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      overflow: hidden;
    }

    /* Gold top rule */
    .hud::before {
      content: '';
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.6;
    }

    .hud-inner {
      padding: 20px 22px 18px;
    }

    /* Header row */
    .hud-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .hud-title {
      font: 300 28px/1 var(--serif);
      letter-spacing: 0.01em;
      color: var(--ink);
    }

    .hud-title em {
      font-style: italic;
      color: var(--gold);
    }

    .hud-tag {
      font: 300 10px/1 var(--mono);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }

    /* Textarea */
    #copy {
      width: 100%;
      min-height: 108px;
      max-height: 200px;
      padding: 10px 12px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.5);
      color: var(--ink);
      font: 300 13px/1.55 var(--serif);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }

    #copy:focus {
      border-color: var(--gold-dim);
    }

    #copy::placeholder {
      color: var(--ink-dim);
    }

    #track {
      display: none;
    }

    .sound-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    #audioToggle {
      font: 400 11px/1 var(--mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 2px;
      border: 1px solid var(--gold-dim);
      background: rgba(200, 169, 110, 0.12);
      color: var(--gold);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    #audioToggle:hover {
      background: rgba(200, 169, 110, 0.2);
      border-color: var(--gold);
    }

    #audioToggle[aria-pressed="true"] {
      background: rgba(200, 169, 110, 0.22);
      box-shadow: 0 0 20px rgba(200, 169, 110, 0.15);
    }

    .file-pick {
      position: relative;
      font: 300 10px/1 var(--mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-dim);
      padding: 7px 12px;
      border-radius: 2px;
      border: 1px dashed var(--border);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .file-pick:hover {
      border-color: var(--gold-dim);
      color: var(--ink);
    }

    .file-pick input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* Controls row */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #mic.mic-secondary {
      font: 300 11px/1 var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-dim);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    #mic:hover {
      border-color: var(--gold-dim);
      color: var(--ink);
    }

    #mic[aria-pressed="true"] {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(200, 169, 110, 0.07);
    }

    #mic[aria-pressed="true"]::before {
      content: '● ';
      color: var(--red);
      animation: blink 1.2s step-start infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* Live stats */
    .stats {
      display: flex;
      gap: 14px;
      margin-left: auto;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .stat-val {
      font: 400 15px/1 var(--mono);
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .stat-label {
      font: 300 9px/1 var(--mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-top: 2px;
    }

    /* Bottom rule with hint */
    .hud-foot {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #hint {
      font: 300 10.5px/1.4 var(--mono);
      color: var(--ink-dim);
      letter-spacing: 0.04em;
    }

    /* Corner mark */
    .corner {
      position: fixed;
      bottom: 20px;
      right: 22px;
      z-index: 10;
      font: 300 10px/1 var(--mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(200, 169, 110, 0.3);
      pointer-events: none;
    }

    /* Audio bars — decorative visual alongside mic button */
    .audio-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .audio-bars.active {
      opacity: 1;
    }

    .audio-bar {
      width: 2px;
      border-radius: 1px;
      background: var(--gold);
      height: 3px;
      transition: height 0.06s;
    }

    #shapeBtn {
      font: 300 10px/1 var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 12px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, box-shadow 0.2s;
    }

    #shapeBtn:hover {
      border-color: var(--accent-dim);
      color: var(--ink);
    }

    #shapeBtn:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>

<body>

  <canvas id="gl" aria-label="Liquid WebGL typography"></canvas>

  <aside class="hud" role="complementary" aria-label="Controls">
    <div class="hud-inner">

      <div class="hud-head">
        <h1 class="hud-title"><em>liquid</em> type</h1>
        <span class="hud-tag">Pretext / WebGL</span>
      </div>

      <audio id="track" loop playsinline preload="auto" crossorigin="anonymous"
        src="../assets/liquid-motion.mp3"></audio>

      <label style="display:none" for="copy">Paragraph text</label>
      <textarea id="copy" placeholder="Type anything…" spellcheck="false" autocomplete="off"></textarea>

      <div class="sound-row">
        <button type="button" id="audioToggle" aria-pressed="false">Play motion</button>
        <label class="file-pick">
          <input type="file" id="audioFile" accept="audio/*" />
          <span>Your track</span>
        </label>
        <button type="button" id="mic" class="mic-secondary" aria-pressed="false">Live mic</button>
        <button type="button" id="shapeBtn" aria-label="Cycle cursor gravity shape">Shape · circle</button>
      </div>

      <div class="controls">

        <div class="audio-bars" id="audioBars" aria-hidden="true">
          <div class="audio-bar" id="bar0"></div>
          <div class="audio-bar" id="bar1"></div>
          <div class="audio-bar" id="bar2"></div>
          <div class="audio-bar" id="bar3"></div>
          <div class="audio-bar" id="bar4"></div>
        </div>

        <div class="stats">
          <div class="stat">
            <span class="stat-val" id="wrapVal">—</span>
            <span class="stat-label">wrap</span>
          </div>
          <div class="stat">
            <span class="stat-val" id="lineVal">—</span>
            <span class="stat-label">lines</span>
          </div>
        </div>
      </div>

      <div class="hud-foot">
        <p id="hint">drag — sculpt wrap · wheel — cursor radius · shape — gravity field</p>
      </div>

    </div>
  </aside>

  <div class="corner" aria-hidden="true">liquid typography</div>

  <script type="module" src="./liquid-webgl.ts"></script>

  <!-- Audio bar animation driven from TS via custom events -->
  <script>
    // Tiny bridge: the TS module dispatches 'audiobands' events
    window.addEventListener('audiobands', e => {
      const { bass, mid, high, pulse } = e.detail
      const p = typeof pulse === 'number' ? pulse : 0
      const bars = [
        document.getElementById('bar0'),
        document.getElementById('bar1'),
        document.getElementById('bar2'),
        document.getElementById('bar3'),
        document.getElementById('bar4'),
      ]
      const vals = [
        bass * (1 + p * 2),
        (bass + mid) * 0.5 * (1 + p),
        mid * (1 + p * 0.8),
        (mid + high) * 0.5,
        high * (1 + p * 1.2),
      ]
      bars.forEach((b, i) => {
        if (b) b.style.height = Math.max(2, Math.min(14, vals[i] * 16)) + 'px'
      })
      const container = document.getElementById('audioBars')
      if (container) container.classList.toggle('active', bass + mid + high + p > 0.04)
    })

    // Wire up line count stat
    window.addEventListener('layoutstats', e => {
      const lv = document.getElementById('lineVal')
      if (lv) lv.textContent = e.detail.lines
    })
  </script>
</body>

</html>
